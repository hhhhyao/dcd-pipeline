name: stage0_ingest_jsonl_tar_to_html
author: yao.lewei1@huawei.com
description: >-
  Ingest wiki part*.jsonl + part*.tar source files into an HTML Lance dataset
  with text, images, and image_labels tables.
operation: ingest
network: false
output_fields:
  text: [id, data, info, tags]
  image: [id, image_bytes, sha256, info, data, tags]
tags: [wiki, ingest, html, lance]
config:
  - name: source_dir
    type: str
    default: ""
    label: Directory containing part*.jsonl and part*.tar
  - name: log_interval
    type: int
    default: 250
    label: Progress log interval in articles
